<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{{ TITLE }}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; }
    #canvas-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    canvas#canvas {
      display: block;
      width: 100%;
      height: 100%;
      /* Prevent the browser from applying any default touch/pointer actions
         on the canvas so that mouse events reach the C++ callbacks cleanly. */
      touch-action: none;
    }
    /* Simple loading overlay - hidden once the module is ready */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      color: #ccc;
      font-family: sans-serif;
      font-size: 1.2em;
      z-index: 10;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Loading…</div>
  <div id="canvas-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>

  <script type="text/javascript">
    // Expose the canvas to Emscripten's Module machinery.
    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })(),
      onRuntimeInitialized: function() {
        document.getElementById('loading').classList.add('hidden');
      },
      print: function(text) { console.log(text); },
      printErr: function(text) { console.warn(text); }
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
