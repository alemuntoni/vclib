name: Standalone Examples - Build and Run

on:
  [push, pull_request]

jobs:
  build_and_run_standalone_examples:
    name: Standalone Examples (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-latest', 'windows-2022']
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      if: runner.os == 'Windows'
      with:
        arch: x64

    - name: Install dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build libtbb-dev

    - name: Install dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install cmake ninja tbb

    - name: Install dependencies
      if: runner.os == 'Windows'
      run: |
        choco install -y cmake ninja

    - name: Ccache
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
        key: standalone-${{ matrix.os }}-${{ github.ref_name }}

    - name: Discover standalone examples
      id: discover
      shell: bash
      run: |
        EXAMPLES_DIR="examples/standalone"
        if [ ! -d "$EXAMPLES_DIR" ]; then
          echo "No standalone examples directory found!"
          exit 1
        fi

        # Find all directories containing a CMakeLists.txt
        EXAMPLES=()
        for dir in "$EXAMPLES_DIR"/*/; do
          if [ -f "${dir}CMakeLists.txt" ]; then
            EXAMPLES+=("$(basename "$dir")")
          fi
        done

        if [ ${#EXAMPLES[@]} -eq 0 ]; then
          echo "No standalone examples found!"
          exit 1
        fi

        echo "Found ${#EXAMPLES[@]} example(s): ${EXAMPLES[*]}"
        echo "examples=${EXAMPLES[*]}" >> $GITHUB_OUTPUT

    - name: Build and run all standalone examples
      shell: bash
      run: |
        EXAMPLES_DIR="examples/standalone"

        for example in ${{ steps.discover.outputs.examples }}; do
          echo ""
          echo "=============================================="
          echo "Building and running: $example"
          echo "=============================================="

          EXAMPLE_PATH="${EXAMPLES_DIR}/${example}"
          BUILD_DIR="${EXAMPLE_PATH}/build"

          # Clean previous build to ensure fresh configuration
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"

          # Configure with Ninja generator (consistent across all platforms)
          cmake -S "$EXAMPLE_PATH" -B "$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

          # Build
          cmake --build "$BUILD_DIR"

          # The executable name: add .exe on Windows (MSVC produces .exe)
          EXECUTABLE="standalone-${example}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXECUTABLE="${EXECUTABLE}.exe"
          fi

          # Run
          echo "Running ${EXECUTABLE}..."
          "$BUILD_DIR/${EXECUTABLE}"

          if [ $? -eq 0 ]; then
            echo "✓ $example passed"
          else
            echo "✗ $example failed!"
            exit 1
          fi
        done
