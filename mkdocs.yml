use_directory_urls: True

plugins:
  - search
  - glightbox
  - open-in-new-tab
  - mkdoxy:
      projects:
        VCLib:
          src-dirs: docs vclib/core/include vclib/render/include vclib/render/src
          full-doc: True # if you want to generate full documentation
          doxy-cfg: # standard doxygen configuration (key: value)
            FILE_PATTERNS: "*.cpp *.h*" # specify file patterns to filter out
            RECURSIVE: True # recursive search in source directories
            EXTRACT_ALL: True # extract all members
            EXTRACT_PRIVATE: True # extract private members
            EXTRACT_STATIC: True # extract static members
            CASE_SENSE_NAMES: True # case sensitive names
            EXCLUDE_SYMBOLS: "std detail mapbox Eigen ImGui bx bgfx" # exclude symbols with this name
            GENERATE_TREEVIEW: True # generate treeview
            DOT_GRAPH_MAX_NODES: 100 # maximum number of nodes in a graph

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences

