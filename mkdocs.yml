site_name: Visual Computing Library

site_author: Alessandro Muntoni
site_description: >-
  a C++20 modern, multi-platform Mesh and Geometry Processing library.

repo_name: VCLib
repo_url: https://github.com/cnr-isti-vclab/vclib/

# Copyright
copyright: Copyright © 2025 Visual Computing Lab - ISTI - Italian National Research Council

theme:
  name: material
  language: en
  # logo: assets/logo.png
  # favicon: assets/logo.png
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    # - navigation.instant
    # - navigation.tracking

  icon:
    repo: fontawesome/brands/github

  palette:
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cnr-isti-vclab
    # - icon: fontawesome/brands/twitter
